services:
  ytgrab:
    build: .
    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ${DOWNLOADS_BASE:-.}/data:${DATA_DIR:-/app/data}
      - ${DOWNLOADS_BASE:-.}/downloads/audio:${AUDIO_DIR:-/app/audio}
      - ${DOWNLOADS_BASE:-.}/downloads/video:${VIDEO_DIR:-/app/video}
      - ${DOWNLOADS_BASE:-.}/downloads/zips:${ZIP_DIR:-/app/zips}
      - ./cookies.txt:${COOKIES_FILE:-/app/cookies.txt}:ro
    environment:
      DATA_DIR:       ${DATA_DIR:-/app/data}
      AUDIO_DIR:      ${AUDIO_DIR:-/app/audio}
      VIDEO_DIR:      ${VIDEO_DIR:-/app/video}
      ZIP_DIR:        ${ZIP_DIR:-/app/zips}
      PORT:           ${PORT:-8000}
      MAX_CONCURRENT: "${MAX_CONCURRENT:-3}"
      COOKIES_FILE:   ${COOKIES_FILE:-/app/cookies.txt}
    restart: unless-stopped